# ====================================
# BACKEND A - Configuración TLS
# ====================================
# Este servicio usa TLS simple (el servidor se identifica, el cliente NO)

# Puerto
server.port=8085

# ====================================
# TLS (HTTPS) - Servidor
# ====================================
# Cuando el profesor devuelva el certificado backend-a.crt:
# 1. Colócalo en: src/main/resources/certs/backend-a.crt
# 2. Descomenta las líneas de abajo:

# server.ssl.key-store=classpath:certs/backend-a-keystore.p12
# server.ssl.key-store-password=password123
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=backend-a

# Certificados firmados por la CA del profesor:
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:certs/backend-a-keystore.p12
server.ssl.key-store-password=password123
server.ssl.key-alias=backend-a

# ====================================
# JWT Configuration
# ====================================
jwt.secret=mi-secret-super-seguro-que-debe-tener-minimo-32-caracteres
jwt.expiration=86400000

# ====================================
# Logging
# ====================================
logging.level.root=INFO
logging.level.co.edu.unisabana=DEBUG
spring.application.name=backend-a
