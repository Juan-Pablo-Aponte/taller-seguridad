# ====================================
# CLIENTE - Configuración TLS/mTLS Cliente
# ====================================
# Este servicio CONSUME las APIs de Backend A y Backend B
# - Para Backend A: necesita confiar en su certificado (Truststore)
# - Para Backend B: necesita presentar un certificado + confiar en el de él (Keystore + Truststore)

# Puerto
server.port=8080

# ====================================
# HTTP Client Configuration (para llamar a los backends)
# ====================================
# Truststore: para verificar que los servidores son confiables
# Se usa en TODAS las llamadas HTTPS

client.truststore.path=classpath:certs/truststore.p12
client.truststore.password=password123

# Keystore: para autenticarse cuando llama a Backend B (mTLS)
# Solo se usa para Backend B que requiere mTLS

client.keystore.path=classpath:certs/cliente-keystore.p12
client.keystore.password=password123

# ====================================
# JWT Configuration
# ====================================
# El cliente genera tokens JWT para identificarse (no depende de certificados)
jwt.secret=mi-secret-super-seguro-que-debe-tener-minimo-32-caracteres
jwt.expiration=86400000

# ====================================
# URLs de los backends
# ====================================
backend.a.url=https://localhost:8085
backend.b.url=https://localhost:8082

# ====================================
# Logging
# ====================================
logging.level.root=INFO
logging.level.co.edu.unisabana=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
spring.application.name=cliente
