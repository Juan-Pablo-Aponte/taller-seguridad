# ====================================
# BACKEND B - Configuración mTLS
# ====================================
# Este servicio usa mTLS (cliente Y servidor se identifican mutuamente)

# Puerto
server.port=8082

# ====================================
# mTLS (HTTPS con autenticación mutua) - Servidor
# ====================================
# El servidor requiere que el CLIENTE presente un certificado válido

# Cuando el profesor devuelva el certificado backend-b.crt:
# 1. Colócalo en: src/main/resources/certs/backend-b.crt
# 2. Descomenta las líneas de abajo:

# server.ssl.key-store=classpath:certs/backend-b-keystore.p12
# server.ssl.key-store-password=password123
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=backend-b
# server.ssl.trust-store=classpath:certs/truststore.p12
# server.ssl.trust-store-password=password123
# server.ssl.trust-store-type=PKCS12
# server.ssl.client-auth=need

# Certificados firmados por la CA del profesor:
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:certs/backend-b-keystore.p12
server.ssl.key-store-password=password123
server.ssl.key-alias=backend-b
server.ssl.trust-store=classpath:certs/truststore.p12
server.ssl.trust-store-password=password123
server.ssl.trust-store-type=PKCS12
server.ssl.client-auth=need

# ====================================
# JWT Configuration
# ====================================
jwt.secret=mi-secret-super-seguro-que-debe-tener-minimo-32-caracteres
jwt.expiration=86400000

# ====================================
# Logging
# ====================================
logging.level.root=INFO
logging.level.co.edu.unisabana=DEBUG
spring.application.name=backend-b
